window:
  width: 1280
  height: 720
  title: "机器人运动学调试界面"

robot:
  urdf_path: "/home/yuxia/Workspace/SingoriX/OmniLink/singorix_omnilink/config/galbot_description/galbot_one_golf_description/galbot_one_golf.urdf"

camera:
  distance: 3.0
  yaw: 0.0
  pitch: 0.0
  target: [0.0, 0.0, 0.0]

  rotate_speed: 0.005
  zoom_scale: 0.1
  dolly_scale: 0.02
  pan_scale: 0.0015
  min_distance: 0.2
  max_distance: 20.0

ui:
  fix_base_like_mujoco: false
  cjk_font_path: ""
  cjk_font_size: 18.0
  theme_preset: "moonlight" # current_dark | moonlight | spectrum_light
  enable_mobile_base_drag: true
  # Match URDF filename substrings (case-insensitive), e.g. galbot_one_golf.urdf
  mobile_base_robots: ["galbot_g1", "galbot_one_golf", "galbot"]
  # Sidebar panel registration (order defines tab order).
  sidebar_panels: ["scene", "ik", "playback", "safety", "joint", "tf", "obstacle", "planner", "teach", "point_cloud"]

ros:
  enable: false

# PCD 点云（map 坐标系）；文件路径相对仓库根目录
point_cloud:
  enable: false
  visible: true
  auto_load_on_start: false
  file_path: "global_cloud.pcd"
  voxel_size: 0.05
  max_points: 500000
  x_min: -100.0
  x_max: 100.0
  y_min: -100.0
  y_max: 100.0
  z_min: -1.0
  z_max: 2.0
  offset_x: 0.0
  offset_y: 0.0
  offset_yaw: 0.0
  point_size_px: 2.0      # ESDF 栅格模式建议 5~8
  color_mode: "height"  # flat | height | intensity
  # 从 PCD 占据栅格 + 欧氏距离变换构建 ESDF（参考 aphropm load_ESDFMap(.pcd)）
  build_esdf: false
  esdf_resolution: 0.05
  esdf_map_origin: [-30.0, -20.0, -0.1]
  esdf_map_size: [60.0, 40.0, 2.1]
  esdf_use_fixed_map: true
  esdf_visual_mode: "occupied"   # occupied | surface | distance
  esdf_color_mode: "height"      # flat | height | distance
  esdf_max_visual_dist: 0.15
  esdf_visual_stride: 2   # occupied 模式也生效，越大越快、越稀疏
  esdf_z_slice_enable: false
  esdf_z_slice_m: 0.5
  esdf_use_raycast: true
  esdf_ray_origin_auto: true
  esdf_ray_origin: [0.0, 0.0, 0.0]
  esdf_min_ray_length: 0.1
  esdf_max_ray_length: 50.0

initial_pose:
  enable: true
  auto_apply_on_start: false
  head_joint_names: ["head_joint1", "head_joint2"]
  leg_joint_names: ["leg_joint1", "leg_joint2", "leg_joint3", "leg_joint4", "leg_joint5"]
  left_arm_joint_names:
    ["left_arm_joint1", "left_arm_joint2", "left_arm_joint3", "left_arm_joint4", "left_arm_joint5", "left_arm_joint6", "left_arm_joint7"]
  right_arm_joint_names:
    [
      "right_arm_joint1",
      "right_arm_joint2",
      "right_arm_joint3",
      "right_arm_joint4",
      "right_arm_joint5",
      "right_arm_joint6",
      "right_arm_joint7",
    ]
  # Planar chassis pose (m, m, rad); same convention as trajectory CSV chassis_x/y/yaw.
  apply_chassis: true
  chassis_x: 0.0
  chassis_y: 0.0
  chassis_yaw: 0.0
  head: [0.0, 0.00989756]
  leg: [0.499191, 1.49907, 1.00046, 0.0, -0.000431432]
  left_arm: [1.99995, -1.60004, -0.599905, -1.69994, 0.0, -0.799924, 0.0]
  right_arm: [-2.0, 1.60008, 0.600051, 1.70001, 0.0, 0.799993, 0.0]

ik:
  mode: "full_body" # single_chain | full_body
  full_body_backend: "wbc_chain_ik" # flex_ik | wbc_chain_ik
  full_body_iterations: 6
  chains:
    - label: "右臂"
      base_link: "torso_base_link"
      tip_link: "right_arm_end_effector_mount_link"
      base_link_candidates: ["torso_base_link", "torso_link", "pelvis"]
      tip_link_candidates: ["right_arm_end_effector_mount_link", "right_rubber_hand", "right_wrist_yaw_link"]
    - label: "左臂"
      base_link: "torso_base_link"
      tip_link: "left_arm_end_effector_mount_link"
      base_link_candidates: ["torso_base_link", "torso_link", "pelvis"]
      tip_link_candidates: ["left_arm_end_effector_mount_link", "left_rubber_hand", "left_wrist_yaw_link"]

playback:
  trajectory_files: []
  selected_index: -1
  last_browser_dir: "config/trajectories"

teach:
  program_files:
    - "config/teach/demo.yaml"
  selected_index: 0
  last_browser_dir: "config/teach"
